name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

# CI only reads the repo (build/test/lint) — give the GITHUB_TOKEN no more than
# read access (addresses zizmor's excessive-permissions finding).
permissions:
  contents: read

# Third-party actions are pinned to commit SHAs (not mutable tags) for
# supply-chain integrity; Dependabot (.github/dependabot.yml) keeps them fresh.
# Checkout uses persist-credentials: false — no job does authenticated git
# operations after checkout, so there's no reason to leave the token in
# .git/config where a build step could read it.

jobs:
  build-and-test:
    name: build & test (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      # protoc is required by tonic-build (prost no longer vendors it);
      # libfuse3-dev for nexus-fs (FUSE);
      # libx11-dev, libxrandr-dev, libxcursor-dev, libxi-dev for nexus-stream (winit X11 backend);
      # libavcodec-dev, libavformat-dev, libavutil-dev, libswscale-dev, libx264-dev for
      #   nexus-stream/ffmpeg (H.264 encode);
      # libpipewire-0.3-dev for nexus-stream/ffmpeg (PipeWire/Wayland capture);
      # xvfb for virtual X server (used by streaming e2e tests).
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler libfuse3-dev pkg-config \
            libx11-dev libxrandr-dev libxcursor-dev libxi-dev \
            libavcodec-dev libavdevice-dev libavfilter-dev libavformat-dev libavutil-dev \
            libpostproc-dev libswresample-dev libswscale-dev libx264-dev \
            libpipewire-0.3-dev \
            xvfb

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build
        run: cargo build --workspace --all-targets --verbose

      - name: Test
        run: cargo test --workspace --verbose

      - name: Build (ffmpeg feature)
        run: cargo build --features nexus-stream/ffmpeg --workspace --all-targets --verbose

      - name: Test (ffmpeg feature)
        run: cargo test --features nexus-stream/ffmpeg --workspace --verbose

  lint:
    name: fmt & clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      # clippy compiles the code, so it needs the same system deps as the build.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler libfuse3-dev pkg-config \
            libx11-dev libxrandr-dev libxcursor-dev libxi-dev \
            libavcodec-dev libavdevice-dev libavfilter-dev libavformat-dev libavutil-dev \
            libpostproc-dev libswresample-dev libswscale-dev libx264-dev \
            libpipewire-0.3-dev \
            xvfb

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
