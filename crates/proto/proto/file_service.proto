syntax = "proto3";
package nexus.fs.v1;

// FileService is what the HOST agent exposes (e.g. the Android phone)
// and what the CLIENT agent calls into (e.g. the Dell's FUSE layer).
//
// Reads are milestone 1; WriteFile adds multi-writer support with
// vector-clock conflict detection (ADR 0005).
service FileService {
  rpc ListDir (ListDirRequest) returns (ListDirResponse);
  rpc Stat (StatRequest) returns (StatResponse);

  // Streamed so large files don't have to fully buffer in memory —
  // important on a phone serving files to a laptop over a slow link.
  rpc ReadFile (ReadFileRequest) returns (stream ReadFileChunk);

  // Multi-writer write carrying the writer's vector clock. The host compares
  // it against its stored clock and either applies it, ignores a stale write,
  // or (on concurrent edits) keeps both — see ADR 0005. Unary/whole-file for
  // backward compatibility; the FUSE layer uses WriteFileStream instead.
  rpc WriteFile (WriteFileRequest) returns (WriteFileResponse);

  // Streaming write for large files (ADR 0010). The client streams 64 KB
  // chunks; the first chunk carries metadata (path, clock, writer_device_id).
  // The host reassembles into a temp file and renames on success, keeping the
  // conflict-detection boundary at stream-end (same as WriteFile).
  rpc WriteFileStream (stream WriteFileChunk) returns (WriteFileResponse);

  // Delete a file, carrying the deleter's vector clock. The host records a
  // tombstone and detects delete-vs-edit conflicts — see ADR 0008.
  rpc DeleteFile (DeleteFileRequest) returns (DeleteFileResponse);

  // Rename/move a file, carrying the writer's vector clock for the OLD path.
  // The host moves the file on disk and transfers the clock entry to the new
  // path. Preserves vector clock history (inode identity unchanged) — see ADR 0009.
  // Detects rename-vs-edit/delete conflicts.
  rpc RenameFile (RenameFileRequest) returns (RenameFileResponse);
}

message ListDirRequest {
  string path = 1;
}

message FileEntry {
  string name = 1;
  bool is_dir = 2;
  uint64 size_bytes = 3;
  int64 modified_unix = 4;
}

message ListDirResponse {
  repeated FileEntry entries = 1;
}

message StatRequest {
  string path = 1;
}

message StatResponse {
  FileEntry entry = 1;
  bool found = 2;
  // The file's current vector clock, so a reading client can sync its own
  // knowledge before editing (ADR 0007). Empty for untracked / not-found.
  VectorClock clock = 3;
}

message ReadFileRequest {
  string path = 1;
  uint64 offset = 2;
  uint64 length = 3;
}

message ReadFileChunk {
  bytes data = 1;
}

// A file's version vector: device id -> logical counter.
message VectorClock {
  map<string, uint64> counters = 1;
}

message WriteFileRequest {
  string path = 1;
  bytes data = 2;
  // The writer's clock for this file AFTER incrementing its own counter.
  VectorClock clock = 3;
  // Which device is performing this write (used in the conflict filename).
  string writer_device_id = 4;
}

message WriteFileResponse {
  enum Result {
    // Incoming clock dominated (or equalled) the stored one: written through.
    APPLIED = 0;
    // Incoming clock was stale (host already had a dominating version):
    // not applied, client should pull the host's newer version.
    STALE = 1;
    // Concurrent conflict. Two shapes, distinguished by conflict_path:
    //  - edit-vs-edit: original kept untouched, incoming written to a
    //    `.conflict-<device>-<ts>` sibling; conflict_path is set.
    //  - delete-vs-edit (the path was tombstoned): the file is resurrected
    //    with the incoming edit and conflict_path is EMPTY (no sibling) —
    //    see ADR 0008.
    CONFLICT = 2;
  }
  Result result = 1;
  // The authoritative clock for `path` after this operation.
  VectorClock clock = 2;
  // Relative path of the conflict copy. Set only for an edit-vs-edit CONFLICT;
  // empty for a delete-vs-edit CONFLICT (see the Result.CONFLICT note).
  string conflict_path = 3;
}

// A single chunk in a streaming write (ADR 0010). The first chunk in the
// stream carries metadata (path, clock, writer_device_id); subsequent chunks
// set only data. The host uses path non-empty as the "stream init" signal.
message WriteFileChunk {
  // Path to write to. Set only on the first chunk of the stream.
  string path = 1;
  // The writer's clock for this file AFTER incrementing its own counter.
  // Set only on the first chunk.
  VectorClock clock = 2;
  // Which device is performing this write. Set only on the first chunk.
  string writer_device_id = 3;
  // Payload bytes for this chunk (present on every chunk).
  bytes data = 4;
}

message DeleteFileRequest {
  string path = 1;
  // The deleter's clock for this file AFTER incrementing its own counter.
  VectorClock clock = 2;
  // Which device is performing the delete.
  string writer_device_id = 3;
}

message DeleteFileResponse {
  enum Result {
    // Delete applied: file removed, a tombstone recorded.
    DELETED = 0;
    // Stale delete (the file has edits the deleter hadn't seen): ignored.
    STALE = 1;
    // Concurrent delete-vs-edit: the file is KEPT (the edit wins, data is
    // preserved) and the conflict is logged — see ADR 0008.
    CONFLICT = 2;
    // Nothing to delete (already gone / never existed).
    NOT_FOUND = 3;
  }
  Result result = 1;
  // The authoritative clock for `path` after this operation (the tombstone
  // clock on DELETED, the live clock otherwise).
  VectorClock clock = 2;
}

message RenameFileRequest {
  string old_path = 1;
  string new_path = 2;
  // The writer's clock for the OLD path AFTER incrementing its own counter.
  VectorClock clock = 3;
  // Which device is performing this rename.
  string writer_device_id = 4;
}

message RenameFileResponse {
  enum Result {
    // Rename applied: file moved, clock transferred to new_path.
    RENAMED = 0;
    // Incoming clock was stale (host already has a dominating version at
    // old_path, e.g. another device moved/deleted it first): not applied.
    STALE = 1;
    // Concurrent conflict (rename-vs-edit or rename-vs-delete). The rename
    // SUCCEEDS (file at new_path), AND the concurrent edit at old_path is
    // preserved as a conflict copy (old_path.conflict-<device>-<ts>). See ADR 0009.
    CONFLICT = 2;
    // Old path not found (never existed or already moved/deleted).
    NOT_FOUND = 3;
  }
  Result result = 1;
  // The authoritative clock for NEW_PATH after this operation.
  VectorClock clock = 2;
  // Relative path of the conflict copy. Set only for CONFLICT (rename-vs-edit);
  // empty for rename-vs-delete CONFLICT (mirrors DeleteFile ADR 0008).
  string conflict_path = 3;
}
