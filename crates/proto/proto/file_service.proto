syntax = "proto3";
package nexus.fs.v1;

// FileService is what the HOST agent exposes (e.g. the Android phone)
// and what the CLIENT agent calls into (e.g. the Dell's FUSE layer).
//
// Reads are milestone 1; WriteFile adds multi-writer support with
// vector-clock conflict detection (ADR 0005).
service FileService {
  rpc ListDir (ListDirRequest) returns (ListDirResponse);
  rpc Stat (StatRequest) returns (StatResponse);

  // Streamed so large files don't have to fully buffer in memory —
  // important on a phone serving files to a laptop over a slow link.
  rpc ReadFile (ReadFileRequest) returns (stream ReadFileChunk);

  // Multi-writer write carrying the writer's vector clock. The host compares
  // it against its stored clock and either applies it, ignores a stale write,
  // or (on concurrent edits) keeps both — see ADR 0005. Unary/whole-file for
  // now; large-file streaming is a future refinement.
  rpc WriteFile (WriteFileRequest) returns (WriteFileResponse);
}

message ListDirRequest {
  string path = 1;
}

message FileEntry {
  string name = 1;
  bool is_dir = 2;
  uint64 size_bytes = 3;
  int64 modified_unix = 4;
}

message ListDirResponse {
  repeated FileEntry entries = 1;
}

message StatRequest {
  string path = 1;
}

message StatResponse {
  FileEntry entry = 1;
  bool found = 2;
  // The file's current vector clock, so a reading client can sync its own
  // knowledge before editing (ADR 0007). Empty for untracked / not-found.
  VectorClock clock = 3;
}

message ReadFileRequest {
  string path = 1;
  uint64 offset = 2;
  uint64 length = 3;
}

message ReadFileChunk {
  bytes data = 1;
}

// A file's version vector: device id -> logical counter.
message VectorClock {
  map<string, uint64> counters = 1;
}

message WriteFileRequest {
  string path = 1;
  bytes data = 2;
  // The writer's clock for this file AFTER incrementing its own counter.
  VectorClock clock = 3;
  // Which device is performing this write (used in the conflict filename).
  string writer_device_id = 4;
}

message WriteFileResponse {
  enum Result {
    // Incoming clock dominated (or equalled) the stored one: written through.
    APPLIED = 0;
    // Incoming clock was stale (host already had a dominating version):
    // not applied, client should pull the host's newer version.
    STALE = 1;
    // Concurrent edit: original kept untouched, incoming written to a
    // `.conflict-<device>-<ts>` sibling. conflict_path is set.
    CONFLICT = 2;
  }
  Result result = 1;
  // The authoritative clock for `path` after this operation.
  VectorClock clock = 2;
  // Relative path of the conflict copy, set only when result == CONFLICT.
  string conflict_path = 3;
}
